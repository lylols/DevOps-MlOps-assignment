name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: node tests/app.test.js

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chronos-calendar:${{ github.sha }} .

      - name: Test Docker container
        run: |
          docker run -d --name chronos-test -p 3000:3000 chronos-calendar:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3000 || exit 1
          docker stop chronos-test
